# Hexo site config
title: Friston's blog
subtitle: Fristonp 
description: 一个专业学习与实践记录博客
keywords:
  - blog
  - hexo
  - github-pages
author: Fristonp
language: zh-CN
timezone: Asia/Shanghai

# URL
# GitHub 用户主页站点请使用:
# 仓库名: YOUR_GITHUB_NAME.github.io
# 访问地址: https://YOUR_GITHUB_NAME.github.io
url: https://Fristonp.github.io
root: /
permalink: posts/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true

# Home page setting
index_generator:
  path: ''
  per_page: 5
  order_by: -date

default_category: uncategorized
category_map:
tag_map:

date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Feed
feed:
  enable: true
  type:
    - atom
    - rss2
  path:
    - atom.xml
    - rss2.xml
  limit: 20
  content: false
  content_limit: 140
  content_limit_delim: ' '
  autodiscovery: true

# Sitemap
sitemap:
  path:
    - sitemap.xml
    - sitemap.txt
  rel: true
  tags: true
  categories: true

# Markdown
markdown:
  preset: default
  render:
    html: true
    xhtmlOut: false
    breaks: true
    linkify: true
    typographer: true
  anchors:
    level: 2
  images:
    lazyload: false
    prepend_root: false
    post_asset: false

# Theme
theme: atelier

# Deployment
# 当前推荐使用 GitHub Actions 发布到 GitHub Pages，
# 因此不依赖 `hexo deploy`。
deploy:
