# Fengge Theme Configuration
# 极简风格主题配置

# 导航菜单
menu:
  首页: /
  归档: /archives/
  关于: /about/

# 首页 Hero 区域
hero:
  title: Friston's Blog
  description: 学习与实践记录

# 页脚
